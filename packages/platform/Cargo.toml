[package]
name = "peterfan-platform"
description = "Platform backends for PeterFan: the mock provider plus OS-specific drivers (macOS today; Windows/Linux planned)."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
default = []
# Apple Silicon GPU active-residency via the private IOReport API. OFF by
# default: the IOReport `GPUPH` residency we can read does not match Activity
# Monitor's GPU% definition (it counts low-power display-compositing states as
# "busy"), so we don't ship it as a headline metric. Kept behind a flag as
# working reference plumbing. See `src/macos_gpu.rs`.
experimental-gpu = []

[dependencies]
peterfan-core = { workspace = true }
sysinfo = { workspace = true }
battery = { workspace = true }
dirs = { workspace = true }
serde_json = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
libc = { workspace = true }
macsmc = { workspace = true }
core-foundation = { workspace = true }
core-foundation-sys = { workspace = true }
