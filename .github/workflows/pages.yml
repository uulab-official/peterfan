name: Deploy landing page

# Publishes the static site in apps/landing/ to GitHub Pages.
# Pages must be enabled with "Source: GitHub Actions" in the repository
# settings (this workflow only builds & deploys the artifact).

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload landing site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
