name: Release

# 버전 태그(v*) 푸시 시 각 플랫폼 바이너리를 빌드하고 GitHub Release에 첨부.
# Universal macOS 바이너리(arm64+x86_64 lipo), SHA256 체크섬, CHANGELOG 자동 추출 포함.
#
# 릴리즈 만들기:
#   git tag -a v1.2.1 -m "..." && git push origin v1.2.1
# 또는 Actions 탭 → Release → Run workflow

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.1)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. CHANGELOG에서 이번 버전의 릴리즈 노트를 추출 ────────────────────────
  release-notes:
    name: Extract release notes
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract from CHANGELOG.md
        id: extract
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for CHANGELOG heading match
          VER="${VERSION#v}"
          # Extract the section between ## [VER] and the next ## [
          NOTES=$(awk "/^## \[$VER\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Store multiline output
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

  # ── 2. macOS Apple Silicon ─────────────────────────────────────────────────
  build-macos-arm:
    name: Build macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-arm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-arm-
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin --bins
      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-arm64
          path: |
            target/aarch64-apple-darwin/release/peterfan
            target/aarch64-apple-darwin/release/peterfan-tui
            target/aarch64-apple-darwin/release/peterfan-menubar
            target/aarch64-apple-darwin/release/peterfand

  # ── 3. macOS Intel ─────────────────────────────────────────────────────────
  # Cross-compiled from an Apple Silicon runner — macos-13 (Intel-hosted)
  # sat queued with no runner ever picking it up (macos-14 jobs in the same
  # run started within seconds), which silently blocked every release from
  # v1.0.0 onward since `publish` requires this job. Xcode's universal SDK on
  # macos-14 cross-compiles x86_64-apple-darwin fine — there's no need for an
  # actual Intel host.
  build-macos-x86:
    name: Build macOS x86_64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-x86-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-x86-
      - name: Build
        run: cargo build --release --target x86_64-apple-darwin --bins
      - name: Upload x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-x86_64
          path: |
            target/x86_64-apple-darwin/release/peterfan
            target/x86_64-apple-darwin/release/peterfan-tui
            target/x86_64-apple-darwin/release/peterfan-menubar
            target/x86_64-apple-darwin/release/peterfand

  # ── 4. Universal macOS 바이너리 + .app 번들 ───────────────────────────────
  package-macos:
    name: Package macOS Universal
    needs: [release-notes, build-macos-arm, build-macos-x86]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: bins-arm64
          path: bins/arm64

      - name: Download x86_64
        uses: actions/download-artifact@v4
        with:
          name: bins-x86_64
          path: bins/x86_64

      - name: Import Developer ID signing certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          if [[ -z "${MACOS_CERTIFICATE_P12_BASE64}" ]]; then
            echo "No Developer ID certificate secret configured; macOS assets will be ad-hoc signed."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/peterfan-signing.keychain-db"
          KEYCHAIN_PASSWORD="${MACOS_KEYCHAIN_PASSWORD:-$(uuidgen)}"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY="${MACOS_SIGN_IDENTITY:-$(security find-identity -p codesigning -v "$KEYCHAIN_PATH" | awk -F\" '/Developer ID Application/ {print $2; exit}')}"
          if [[ -z "$IDENTITY" ]]; then
            echo "error: no Developer ID Application identity found in imported certificate." >&2
            security find-identity -p codesigning -v "$KEYCHAIN_PATH" >&2 || true
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"
          echo "PETERFAN_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Create Universal binaries (lipo)
        run: |
          mkdir -p bins/universal
          for bin in peterfan peterfan-tui peterfan-menubar peterfand; do
            lipo -create \
              "bins/arm64/$bin" \
              "bins/x86_64/$bin" \
              -output "bins/universal/$bin"
            chmod +x "bins/universal/$bin"
          done

      - name: Assemble archive
        shell: bash
        run: |
          VERSION="${{ needs.release-notes.outputs.version }}"
          VER="${VERSION#v}"
          NAME="peterfan-${VERSION}-universal-apple-darwin"
          mkdir -p "dist/$NAME"
          cp bins/universal/* "dist/$NAME/"
          cp README.md LICENSE CHANGELOG.md "dist/$NAME/"
          # Sign loose CLI binaries too. In official releases this uses
          # Developer ID; in forks/local release builds it falls back to ad-hoc.
          for bin in peterfan peterfan-tui peterfan-menubar peterfand; do
            scripts/sign-macos.sh "dist/$NAME/$bin"
          done
          # .app bundle (bundle-macos.sh signs it internally)
          VERSION="${VER}" bash scripts/bundle-macos.sh \
            "bins/universal/peterfan-menubar" "dist/$NAME"
          tar -czf "dist/${NAME}.tar.gz" -C dist "$NAME"
          echo "ASSET=dist/${NAME}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Build .dmg (drag-to-Applications installer, no Terminal needed)
        shell: bash
        run: |
          VERSION="${{ needs.release-notes.outputs.version }}"
          NAME="peterfan-${VERSION}-universal-apple-darwin"
          bash scripts/make-dmg.sh "dist/$NAME/PeterFan.app" "dist/PeterFan-${VERSION}.dmg"

      - name: Notarize macOS .dmg
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
        run: |
          VERSION="${{ needs.release-notes.outputs.version }}"
          DMG="dist/PeterFan-${VERSION}.dmg"

          if [[ -z "${PETERFAN_SIGN_IDENTITY:-}" ]]; then
            echo "No Developer ID signing identity; skipping notarization."
            exit 0
          fi
          if [[ -z "${APPLE_API_KEY_ID}" || -z "${APPLE_API_ISSUER_ID}" || -z "${APPLE_API_KEY_B64}" ]]; then
            echo "No App Store Connect API key secrets; skipping notarization."
            exit 0
          fi

          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$KEY_PATH"
          APPLE_API_KEY_PATH="$KEY_PATH" scripts/notarize-macos.sh "$DMG"

      - name: Keep only verified macOS .dmg
        shell: bash
        run: |
          DMG=$(ls dist/PeterFan-*.dmg 2>/dev/null | head -n 1 || true)
          if [[ -z "$DMG" ]]; then
            exit 0
          fi
          if scripts/check-macos-release.sh "$DMG"; then
            echo "Verified distributable DMG: $DMG"
          else
            echo "DMG is not a verified notarized release artifact; removing it so GitHub Release does not publish a broken installer." >&2
            rm -f "$DMG"
          fi

      - name: Upload macOS universal archive
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-universal
          path: ${{ env.ASSET }}

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-dmg
          path: dist/PeterFan-*.dmg

  # ── 5. Windows ─────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x64-
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc --bins
      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $name = "peterfan-${{ github.ref_name }}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          foreach ($b in @("peterfan","peterfan-tui","peterfan-menubar","peterfand")) {
            Copy-Item "target/x86_64-pc-windows-msvc/release/$b.exe" "dist/$name/"
          }
          Copy-Item README.md, LICENSE, CHANGELOG.md "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          "ASSET=dist/$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Upload Windows archive
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: ${{ env.ASSET }}

  # ── 6. GitHub Release 생성 + 체크섬 첨부 ─────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [release-notes, package-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          sha256sum *.tar.gz *.zip *.dmg 2>/dev/null | tee checksums.txt || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-notes.outputs.version }}
          name: "PeterFan ${{ needs.release-notes.outputs.version }}"
          body: ${{ needs.release-notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.release-notes.outputs.version, '-') }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
            dist/checksums.txt
          fail_on_unmatched_files: false
